<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semua Destinasi — Wisata Enrekang</title>

    <!-- Font dari Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- CSS kita sendiri -->
    <link rel="stylesheet" href="css/destinasi.css">
</head>
<body>

    <!-- ═══════════════════════════════════════
         HEADER
    ════════════════════════════════════════ -->
    <header class="site-header">
        <a href="index.html" class="logo">
            Wisata <span>Enrekang</span>
        </a>
        <a href="index.html" class="header-back">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 12H5M12 5l-7 7 7 7"/>
            </svg>
            Kembali ke Beranda
        </a>
    </header>


    <!-- ═══════════════════════════════════════
         JUDUL + FILTER + PENCARIAN
    ════════════════════════════════════════ -->
    <div class="page-hero">

        <div class="page-hero-top">
            <h1 class="page-title">
                Semua<br>
                <em>Destinasi</em>
            </h1>
            <p id="count-label" class="page-count">Memuat...</p>
        </div>

        <!-- Tombol filter kategori + kotak pencarian -->
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="semua">Semua</button>
            <button class="filter-btn" data-filter="Permandian">💧 Permandian</button>
            <button class="filter-btn" data-filter="Gunung">🗻 Gunung</button>
            <button class="filter-btn" data-filter="Taman">🌿 Taman</button>
            <button class="filter-btn" data-filter="Wisata Budaya">🥾 Wisata Budaya</button>

            <div class="search-wrap">
                <svg class="search-icon" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <circle cx="11" cy="11" r="8"/>
                    <path stroke-linecap="round" d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="search-input"
                       class="search-input"
                       placeholder="Cari destinasi...">
            </div>
        </div>

    </div>


    <!-- ═══════════════════════════════════════
         GRID KARTU
         Diisi otomatis oleh destinasi.js
         (skeleton loading ditampilkan sementara)
    ════════════════════════════════════════ -->
    <div id="dest-grid" class="dest-grid">
        <div class="skeleton"></div>
        <div class="skeleton" style="animation-delay:.1s"></div>
        <div class="skeleton" style="animation-delay:.2s"></div>
        <div class="skeleton" style="animation-delay:.3s"></div>
        <div class="skeleton" style="animation-delay:.15s"></div>
        <div class="skeleton" style="animation-delay:.25s"></div>
    </div>


    <!-- JS kita sendiri (di bawah body agar HTML sudah terbaca dulu) -->
    <script src="js/destinasi.js"></script>

</body>
</html>
